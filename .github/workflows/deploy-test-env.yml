name: Deploy Test Environment

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region for test environment
        required: true
        default: us-east-1
        type: string
      environment:
        description: Terraform environment suffix
        required: true
        default: test
        type: string
      bedrock_strict_contracts:
        description: Enforce strict raw model schema compliance
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      supervisor_cors_origin:
        description: Allowed browser origin for Supervisor API CORS
        required: true
        default: "*"
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-test-env-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy-test-env:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TERRAFORM_DIR: infra/terraform
      USE_LOCAL_STUB_ROUTER: "false"
      BEDROCK_STRICT_CONTRACTS: ${{ inputs.bedrock_strict_contracts }}
      ARTIFACT_STORE_MODE: dynamodb
      MODEL_FOUNDRY: ${{ secrets.MODEL_FOUNDRY }}
      MODEL_GHOSTWRITER: ${{ secrets.MODEL_GHOSTWRITER }}
      MODEL_COMPRESSION: ${{ secrets.MODEL_COMPRESSION != '' && secrets.MODEL_COMPRESSION || secrets.MODEL_GHOSTWRITER }}
      MODEL_CONTINUITY: ${{ secrets.MODEL_CONTINUITY != '' && secrets.MODEL_CONTINUITY || secrets.MODEL_GHOSTWRITER }}
      MODEL_STYLE: ${{ secrets.MODEL_STYLE != '' && secrets.MODEL_STYLE || secrets.MODEL_GHOSTWRITER }}
      MODEL_EVALUATOR: ${{ secrets.MODEL_EVALUATOR }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
      ALARM_SNS_TOPIC_ARN: ${{ secrets.ALARM_SNS_TOPIC_ARN }}
      TF_VAR_aws_region: ${{ inputs.aws_region }}
      TF_VAR_environment: ${{ inputs.environment }}
      TF_VAR_use_local_stub_router: "false"
      TF_VAR_bedrock_strict_contracts: ${{ inputs.bedrock_strict_contracts }}
      TF_VAR_model_foundry: ${{ secrets.MODEL_FOUNDRY }}
      TF_VAR_model_ghostwriter: ${{ secrets.MODEL_GHOSTWRITER }}
      TF_VAR_model_compression: ${{ secrets.MODEL_COMPRESSION != '' && secrets.MODEL_COMPRESSION || secrets.MODEL_GHOSTWRITER }}
      TF_VAR_model_continuity: ${{ secrets.MODEL_CONTINUITY != '' && secrets.MODEL_CONTINUITY || secrets.MODEL_GHOSTWRITER }}
      TF_VAR_model_style: ${{ secrets.MODEL_STYLE != '' && secrets.MODEL_STYLE || secrets.MODEL_GHOSTWRITER }}
      TF_VAR_model_evaluator: ${{ secrets.MODEL_EVALUATOR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}

      - name: Validate required deploy secrets
        run: |
          set -euo pipefail
          missing=0
          for key in TF_STATE_BUCKET TF_STATE_LOCK_TABLE ALARM_SNS_TOPIC_ARN MODEL_FOUNDRY MODEL_GHOSTWRITER MODEL_EVALUATOR; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build runtime and Lambda bundle
        run: |
          npm run build
          npm run build:lambda-bundle

      - name: Terraform init (remote state)
        run: |
          terraform -chdir="$TERRAFORM_DIR" init -reconfigure \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=bedrock-agentcore-writer/${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE" \
            -backend-config="encrypt=true"

      - name: Terraform import existing resources (best-effort)
        run: |
          set -euo pipefail

          PROJECT="bedrock-agentcore-writer"
          ENV_NAME="${{ inputs.environment }}"
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          AWS_REGION="${{ inputs.aws_region }}"

          import_if_present() {
            local address="$1"
            local id="$2"
            local import_log
            import_log="$(mktemp)"

            import_once() {
              local log_file="$1"
              set +e
              terraform -chdir="$TERRAFORM_DIR" import "$address" "$id" 2>&1 | tee "$log_file"
              local rc=${PIPESTATUS[0]}
              set -e
              return "$rc"
            }

            import_once "$import_log"
            local rc=$?

            if [ "$rc" -eq 0 ]; then
              return 0
            fi

            if grep -q "Cannot import non-existent remote object" "$import_log" || grep -q "Resource already managed by Terraform" "$import_log"; then
              return 0
            fi

            if grep -q "Error acquiring the state lock" "$import_log"; then
              local lock_id
              lock_id="$(grep -Eo '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' "$import_log" | head -n 1 || true)"
              if [ -n "$lock_id" ]; then
                echo "State lock detected during import ($address). Unlocking lock id: $lock_id"
                terraform -chdir="$TERRAFORM_DIR" force-unlock -force "$lock_id"

                local retry_log
                retry_log="$(mktemp)"
                import_once "$retry_log"
                local retry_rc=$?
                if [ "$retry_rc" -eq 0 ]; then
                  return 0
                fi

                if grep -q "Cannot import non-existent remote object" "$retry_log" || grep -q "Resource already managed by Terraform" "$retry_log"; then
                  return 0
                fi
              fi
            fi

            echo "Import failed for $address ($id)."
            return 1
          }

          import_if_present 'aws_dynamodb_table.artifacts' "${PROJECT}-artifacts-${ENV_NAME}"
          import_if_present 'aws_iam_role.writer_execution' "${PROJECT}-execution-${ENV_NAME}"
          import_if_present 'aws_iam_role_policy.writer_execution' "${PROJECT}-execution-${ENV_NAME}:${PROJECT}-execution-policy-${ENV_NAME}"
          import_if_present 'aws_sfn_state_machine.writer_workflow' "arn:aws:states:${AWS_REGION}:${ACCOUNT_ID}:stateMachine:${PROJECT}-workflow-${ENV_NAME}"
          import_if_present 'aws_cloudwatch_log_group.stepfunctions_logs' "/aws/vendedlogs/states/${PROJECT}-workflow-${ENV_NAME}"
          import_if_present 'aws_cloudwatch_log_resource_policy.stepfunctions_delivery' "${PROJECT}-stepfunctions-logs-${ENV_NAME}"
          import_if_present 'aws_cloudwatch_metric_alarm.stepfunctions_executions_failed' "${PROJECT}-workflow-executions-failed-${ENV_NAME}"
          import_if_present 'aws_cloudwatch_dashboard.operations[0]' "${PROJECT}-operations-${ENV_NAME}"

          import_if_present 'aws_iam_role.supervisor_api[0]' "${PROJECT}-supervisor-api-${ENV_NAME}"
          import_if_present 'aws_iam_role_policy.supervisor_api[0]' "${PROJECT}-supervisor-api-${ENV_NAME}:${PROJECT}-supervisor-api-policy-${ENV_NAME}"
          import_if_present 'aws_lambda_function.supervisor_api[0]' "${PROJECT}-supervisor-api-${ENV_NAME}"
          import_if_present 'aws_lambda_function_url.supervisor_api[0]' "${PROJECT}-supervisor-api-${ENV_NAME}"
          import_if_present 'aws_lambda_permission.supervisor_api_public_invoke[0]' "${PROJECT}-supervisor-api-${ENV_NAME}/FunctionURLAllowPublicInvoke"

          for stage in narrative_foundry ghostwriter compression continuity style evaluator; do
            import_if_present "aws_lambda_function.stage_handlers[\"${stage}\"]" "${PROJECT}-${stage}-${ENV_NAME}"
            import_if_present "aws_cloudwatch_metric_alarm.lambda_errors[\"${stage}\"]" "${PROJECT}-${stage}-${ENV_NAME}-errors-${ENV_NAME}"
          done

      - name: Terraform validate
        run: terraform -chdir="$TERRAFORM_DIR" validate

      - name: Terraform plan
        run: |
          set -euo pipefail

          PLAN_ARGS=(
            -var="enable_supervisor_api=true"
            -var="supervisor_cors_allowed_origins=[\"${{ inputs.supervisor_cors_origin }}\"]"
            -var="alarm_actions=[\"$ALARM_SNS_TOPIC_ARN\"]"
            -out=tfplan
          )

          plan_with_log() {
            local log_file="$1"
            set +e
            terraform -chdir="$TERRAFORM_DIR" plan "${PLAN_ARGS[@]}" 2>&1 | tee "$log_file"
            local rc=${PIPESTATUS[0]}
            set -e
            return "$rc"
          }

          PLAN_LOG="$(mktemp)"
          if plan_with_log "$PLAN_LOG"; then
            exit 0
          fi

          if grep -q "Error acquiring the state lock" "$PLAN_LOG"; then
            LOCK_ID="$(grep -Eo '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' "$PLAN_LOG" | head -n 1 || true)"
            if [ -n "$LOCK_ID" ]; then
              echo "Terraform state lock detected (lock id: $LOCK_ID). Attempting force-unlock and single retry."
              terraform -chdir="$TERRAFORM_DIR" force-unlock -force "$LOCK_ID"

              RETRY_LOG="$(mktemp)"
              if plan_with_log "$RETRY_LOG"; then
                exit 0
              fi
            fi
          fi

          echo "Terraform plan failed."
          exit 1

      - name: Terraform apply
        run: terraform -chdir="$TERRAFORM_DIR" apply -auto-approve tfplan

      - name: Runtime verify (live)
        env:
          VERIFY_RUNTIME_MODE: live
          VERIFY_RUNTIME_WRITE_TEST: "true"
          ARTIFACT_DDB_TABLE: ""
        run: |
          export ARTIFACT_DDB_TABLE="$(terraform -chdir=$TERRAFORM_DIR output -raw artifact_table_name)"
          npm run verify:runtime

      - name: Post-deploy smoke (Step Functions)
        env:
          SMOKE_RUNS: "1"
          SMOKE_TIMEOUT_SECONDS: "300"
        run: |
          export STATE_MACHINE_ARN="$(terraform -chdir=$TERRAFORM_DIR output -raw state_machine_arn)"
          npm run smoke:stepfunctions

      - name: Emit deploy endpoints
        run: |
          SUPERVISOR_URL="$(terraform -chdir=$TERRAFORM_DIR output -raw supervisor_api_url)"
          echo "Supervisor API URL: $SUPERVISOR_URL"
          {
            echo "## Deploy Outputs"
            echo ""
            echo "- Supervisor API URL: $SUPERVISOR_URL"
          } >> "$GITHUB_STEP_SUMMARY"
