<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writer Supervisor MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Literata:opsz,wght@7..72,400;7..72,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="shell">
      <section class="card card-controls">
        <h1>Writer Supervisor</h1>
        <p class="subhead">Develop, edit, and evaluate prose through the multi-agent workflow.</p>

        <label>
          Supervisor API Base URL
          <input id="apiBase" placeholder="https://api.example.com" />
        </label>

        <label>
          Action
          <select id="action">
            <option value="develop">Develop</option>
            <option value="edit">Edit</option>
            <option value="evaluate">Evaluate</option>
          </select>
        </label>

        <div class="row">
          <label>
            Chapter ID
            <input id="chapterId" value="ch-01" />
          </label>
          <label>
            Scene ID
            <input id="sceneId" value="sc-01" />
          </label>
        </div>

        <label>
          Draft
          <textarea id="draft" rows="10">A maintenance drone hovered outside the lighthouse dome as the foghorn stuttered awake.</textarea>
        </label>

        <label>
          Edit Instruction (for Edit action)
          <textarea id="instruction" rows="4" placeholder="Tighten pacing and sharpen sensory detail."></textarea>
        </label>

        <button id="runBtn">Run Supervisor</button>
        <p id="statusLine" class="status">Idle</p>
      </section>

      <section class="card card-results">
        <h2>Latest Outputs</h2>
        <div class="meta" id="meta"></div>

        <h3>Draft Output</h3>
        <pre id="draftOut" class="panel"></pre>

        <h3>Evaluator Summary</h3>
        <pre id="evalOut" class="panel"></pre>

        <h3>Raw Latest-By-Kind</h3>
        <pre id="rawOut" class="panel"></pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
